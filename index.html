<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hauskreis App</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f4f0;
      color: #2c2c2c;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .cross { font-size: 64px; margin-bottom: 24px; }
    h1 { font-size: 32px; font-weight: 700; color: #5c3d1e; margin-bottom: 12px; }
    p { font-size: 17px; color: #666; max-width: 400px; line-height: 1.6; margin-bottom: 32px; }
    .badge {
      display: inline-block;
      background: #f0ebe3;
      border: 1px solid #c8a97a;
      color: #5c3d1e;
      font-size: 13px;
      font-weight: 600;
      padding: 4px 14px;
      border-radius: 20px;
      margin-bottom: 8px;
    }
    .links { margin-top: 40px; }
    .links a {
      color: #5c3d1e;
      font-size: 14px;
      text-decoration: none;
      border-bottom: 1px solid #c8a97a;
      padding-bottom: 1px;
    }
    footer { position: fixed; bottom: 20px; font-size: 12px; color: #aaa; }
  </style>
</head>
<body>
  <div class="cross">✝</div>
  <div class="badge">Demnächst im App Store</div>
  <h1>Hauskreis App</h1>
  <p>Dein privater Raum für deinen Hauskreis.<br />Treffen planen, Gebete teilen, gemeinsam wachsen.</p>
  <div class="links">
    <a href="/about">Über uns</a>
    &nbsp;·&nbsp;
    <a href="/privacy">Datenschutzerklärung</a>
  </div>
  <footer>© 2026 Hauskreis App · Sven Hasse & Moritz Pereira</footer>
</body>
</html>
